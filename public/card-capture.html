<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Add Card — Secure Payment</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            padding: 32px 32px 24px;
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; }
        .header p { margin: 6px 0 0; font-size: 14px; opacity: 0.9; }
        .body { padding: 24px 32px 32px; }
        .info-block {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .info-block .label {
            font-size: 12px;
            color: #065f46;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin: 0 0 4px;
            font-weight: 600;
        }
        .info-block .value {
            font-size: 16px;
            font-weight: 600;
            color: #064e3b;
            margin: 0;
        }
        .info-block .sub {
            font-size: 13px;
            color: #065f46;
            margin: 4px 0 0;
        }
        label.field-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin: 0 0 6px;
        }
        #card-element {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
        }
        .error {
            color: #dc2626;
            font-size: 13px;
            margin: 8px 0 0;
        }
        button.primary {
            width: 100%;
            padding: 14px;
            background: #059669;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        button.primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .footer-note {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 16px;
            line-height: 1.5;
        }
        .success, .fatal {
            padding: 24px;
            text-align: center;
        }
        .success { background: #ecfdf5; }
        .fatal { background: #fef2f2; color: #991b1b; }
        .success .icon, .fatal .icon { font-size: 42px; margin-bottom: 12px; }
        .loading { text-align: center; padding: 40px 20px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Add your card</h1>
            <p>Secure payment via Stripe</p>
        </div>
        <div id="loading" class="loading">Verifying your link…</div>
        <div id="fatal" class="fatal" style="display:none;">
            <div class="icon">⚠️</div>
            <p id="fatal-text">This link is invalid or has expired.</p>
        </div>
        <div id="success" class="success" style="display:none;">
            <div class="icon">✅</div>
            <h2 style="margin:0; color:#065f46;">Card saved</h2>
            <p style="color:#065f46; margin:8px 0 0;">Thanks — the property will take payment before your arrival. You can close this window.</p>
        </div>
        <div id="form-wrap" class="body" style="display:none;">
            <div id="info" class="info-block"></div>
            <form id="card-form">
                <label class="field-label">Card details</label>
                <div id="card-element"></div>
                <p id="card-errors" class="error"></p>
                <button type="submit" class="primary" id="submit-btn">Save card</button>
            </form>
            <p class="footer-note">
                Your card is stored securely with Stripe.<br>
                The property never sees your card number.
            </p>
        </div>
    </div>
    <script>
        // Token from URL fragment — never sent to the server as part of the
        // URL query string (would land in access logs). We POST it in the
        // body of API calls instead.
        const token = window.location.hash.slice(1);
        const el = {
            loading: document.getElementById('loading'),
            fatal: document.getElementById('fatal'),
            fatalText: document.getElementById('fatal-text'),
            success: document.getElementById('success'),
            formWrap: document.getElementById('form-wrap'),
            info: document.getElementById('info'),
            cardErrors: document.getElementById('card-errors'),
            submitBtn: document.getElementById('submit-btn'),
            form: document.getElementById('card-form'),
        };
        function showFatal(msg) {
            el.loading.style.display = 'none';
            el.fatal.style.display = 'block';
            if (msg) el.fatalText.textContent = msg;
        }
        function showSuccess() {
            el.loading.style.display = 'none';
            el.formWrap.style.display = 'none';
            el.success.style.display = 'block';
        }
        let stripe = null;
        let cardElement = null;

        (async () => {
            if (!token) return showFatal('This link is missing its access token.');
            try {
                const r = await fetch('/api/public/booking/verify-capture-card-token?token=' + encodeURIComponent(token));
                const data = await r.json();
                if (!data.success) return showFatal(data.error || 'This link is invalid.');
                const b = data.booking || {};
                const s = data.stripe || {};
                const currency = b.currency || '';
                const balance = parseFloat(b.balance_amount || 0).toFixed(2);
                const arrival = b.arrival_date ? new Date(b.arrival_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
                const alreadyNote = b.has_card_already
                    ? '<p class="sub">A card is already saved for this booking — submitting a new one will replace it.</p>'
                    : '';
                el.info.innerHTML = `
                    <p class="label">${b.property_name || 'Your stay'}</p>
                    <p class="value">${currency} ${balance}</p>
                    <p class="sub">Balance charged before arrival${arrival ? ' (' + arrival + ')' : ''}. No charge today.</p>
                    ${alreadyNote}
                `;
                stripe = Stripe(s.publishable_key);
                const elements = stripe.elements();
                cardElement = elements.create('card', {
                    hidePostalCode: false,
                    style: { base: { fontSize: '16px', color: '#0f172a' } }
                });
                cardElement.mount('#card-element');
                cardElement.on('change', ev => {
                    el.cardErrors.textContent = (ev && ev.error) ? ev.error.message : '';
                });
                el.loading.style.display = 'none';
                el.formWrap.style.display = 'block';
            } catch (e) {
                console.error(e);
                showFatal('We could not load the payment form. Please try again in a minute.');
            }
        })();

        el.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!stripe || !cardElement) return;
            el.cardErrors.textContent = '';
            el.submitBtn.disabled = true;
            el.submitBtn.textContent = 'Saving…';
            try {
                const { paymentMethod, error: pmErr } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                });
                if (pmErr) {
                    el.cardErrors.textContent = pmErr.message || 'Could not accept card.';
                    el.submitBtn.disabled = false;
                    el.submitBtn.textContent = 'Save card';
                    return;
                }
                const r = await fetch('/api/public/booking/capture-card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, payment_method_id: paymentMethod.id })
                });
                const data = await r.json();
                if (!data.success) {
                    el.cardErrors.textContent = data.error || 'Could not save card.';
                    el.submitBtn.disabled = false;
                    el.submitBtn.textContent = 'Save card';
                    return;
                }
                showSuccess();
            } catch (err) {
                console.error(err);
                el.cardErrors.textContent = err.message || 'Something went wrong.';
                el.submitBtn.disabled = false;
                el.submitBtn.textContent = 'Save card';
            }
        });
    </script>
</body>
</html>
