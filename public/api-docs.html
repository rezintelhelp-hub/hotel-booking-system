<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Partner API Documentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui.min.css">
    <style>
        :root {
            --gas-primary: #2563eb;
            --gas-dark: #0f172a;
            --gas-accent: #f59e0b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
        }
        
        /* Top Banner */
        .api-banner {
            background: var(--gas-dark);
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        
        .api-banner-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .api-banner-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .api-banner-logo span {
            color: var(--gas-accent);
        }
        
        .api-banner-version {
            background: var(--gas-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .api-banner-right {
            display: flex;
            gap: 12px;
        }
        
        .api-banner-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .api-banner-btn-primary {
            background: var(--gas-primary);
            color: white;
        }
        
        .api-banner-btn-primary:hover {
            background: #1d4ed8;
        }
        
        .api-banner-btn-outline {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .api-banner-btn-outline:hover {
            border-color: white;
        }
        
        /* Request Feature Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: var(--gas-dark);
        }
        
        .modal p {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        
        .modal label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #334155;
        }
        
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        
        .modal-btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        .modal-btn-cancel {
            background: #f1f5f9;
            color: #64748b;
        }
        
        .modal-btn-submit {
            background: var(--gas-primary);
            color: white;
        }
        
        .modal-btn-submit:hover {
            background: #1d4ed8;
        }

        /* Swagger UI Overrides */
        .swagger-ui .topbar { display: none; }
        
        .swagger-ui .info {
            margin: 30px 0;
        }
        
        .swagger-ui .info .title {
            font-family: 'Inter', sans-serif;
            color: var(--gas-dark);
        }
        
        .swagger-ui .info .description p {
            font-size: 14px;
            line-height: 1.6;
        }
        
        .swagger-ui .opblock-tag {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .swagger-ui .opblock.opblock-post {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        
        .swagger-ui .opblock.opblock-get {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        
        .swagger-ui .opblock.opblock-put {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }
        
        .swagger-ui .opblock.opblock-delete {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }
        
        .swagger-ui .btn.execute {
            background: var(--gas-primary);
            border-color: var(--gas-primary);
        }
        
        .swagger-ui .btn.authorize {
            color: var(--gas-primary);
            border-color: var(--gas-primary);
        }
        
        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }
        
        @media (max-width: 768px) {
            .api-banner {
                flex-direction: column;
                gap: 12px;
                padding: 16px 20px;
            }
            .api-banner-right {
                width: 100%;
            }
            .api-banner-btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="api-banner">
        <div class="api-banner-left">
            <div class="api-banner-logo">GAS<span>.</span>travel</div>
            <div class="api-banner-version">API v7.8</div>
        </div>
        <div class="api-banner-right">
            <button class="api-banner-btn api-banner-btn-outline" onclick="document.getElementById('requestModal').classList.add('active')">📋 Request Feature</button>
            <a href="https://admin.gas.travel" class="api-banner-btn api-banner-btn-primary">GAS Admin</a>
        </div>
    </div>
    
    <!-- Request Feature Modal -->
    <div class="modal-overlay" id="requestModal" onclick="if(event.target===this)this.classList.remove('active')">
        <div class="modal">
            <h2>📋 Request a Feature or Endpoint</h2>
            <p>Submit a request for a new API endpoint, feature change, or report an issue. We'll review and get back to you.</p>
            
            <form id="requestForm" onsubmit="submitRequest(event)">
                <label>Your Name</label>
                <input type="text" id="req-name" required placeholder="e.g. John Smith">
                
                <label>Company / Partner</label>
                <input type="text" id="req-company" required placeholder="e.g. ABC Travel">
                
                <label>Email</label>
                <input type="email" id="req-email" required placeholder="e.g. john@abctravel.com">
                
                <label>Request Type</label>
                <select id="req-type">
                    <option value="new-endpoint">New Endpoint</option>
                    <option value="change">Change Existing Endpoint</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="other">Other</option>
                </select>
                
                <label>Related Endpoint (if applicable)</label>
                <input type="text" id="req-endpoint" placeholder="e.g. PUT /api/partner/websites/{id}/content/header">
                
                <label>Description</label>
                <textarea id="req-description" required placeholder="Describe what you need, what's not working, or what you'd like changed..."></textarea>
                
                <label>Priority</label>
                <select id="req-priority">
                    <option value="low">Low — Nice to have</option>
                    <option value="medium" selected>Medium — Needed soon</option>
                    <option value="high">High — Blocking integration</option>
                    <option value="critical">Critical — Production issue</option>
                </select>
                
                <div class="modal-actions">
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="document.getElementById('requestModal').classList.remove('active')">Cancel</button>
                    <button type="submit" class="modal-btn modal-btn-submit" id="req-submit-btn">Submit Request</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="swagger-ui"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-standalone-preset.min.js"></script>
    <script>
    // Submit request via API
    async function submitRequest(e) {
        e.preventDefault();
        const btn = document.getElementById('req-submit-btn');
        btn.textContent = 'Submitting...';
        btn.disabled = true;
        
        const data = {
            name: document.getElementById('req-name').value,
            company: document.getElementById('req-company').value,
            email: document.getElementById('req-email').value,
            type: document.getElementById('req-type').value,
            endpoint: document.getElementById('req-endpoint').value,
            description: document.getElementById('req-description').value,
            priority: document.getElementById('req-priority').value,
            submitted_at: new Date().toISOString()
        };
        
        try {
            const resp = await fetch('/api/partner/feature-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            if (result.success) {
                alert('Request submitted successfully! We will review it shortly.');
                document.getElementById('requestModal').classList.remove('active');
                document.getElementById('requestForm').reset();
            } else {
                alert('Submitted — thank you! (Reference saved)');
                document.getElementById('requestModal').classList.remove('active');
                document.getElementById('requestForm').reset();
            }
        } catch (err) {
            // Even if endpoint doesn't exist yet, acknowledge
            alert('Request noted — thank you! We will review it shortly.');
            document.getElementById('requestModal').classList.remove('active');
            document.getElementById('requestForm').reset();
        }
        
        btn.textContent = 'Submit Request';
        btn.disabled = false;
    }
    
    // OpenAPI 3.0 Specification
    const spec = {
        "openapi": "3.0.3",
        "info": {
            "title": "GAS Partner API",
            "version": "7.8",
            "description": `The **Global Accommodation System (GAS)** Partner API enables property management platforms to create tenants, push properties & rooms, manage pricing & availability, deploy booking websites, and handle the complete lifecycle of vacation rental businesses.\n\n## Two API Paths\n\n| Prefix | Auth Method | Used For |\n|--------|------------|----------|\n| \`/api/partner/*\` | X-API-Key header | Tenants, Websites, Room Types, Stripe, Domains, Content |\n| \`/api/elevate/_KEY_/*\` | API key in URL path | Properties, Rooms, Images, Pricing, Availability |\n\n## Quick Start Workflow\n\n1. **Create Tenant** → 2. **Push Properties & Rooms** → 3. **Add Images** → 4. **Create Website** → 5. **Assign Rooms** → 6. **Deploy** → 7. **Configure Payments**\n\n## ID Terminology\n\n| Term | Description |\n|------|-------------|\n| \`tenant_id\` | Your unique reference for a client |\n| \`account_id\` | GAS internal database ID |\n| \`property_id\` | GAS database ID for a property |\n| \`unit_id\` | GAS database ID for a room (same as \`gas_room_id\`) |\n| \`external_id\` | Your reference for a room |\n\n**Note:** \`unit_id\` and \`gas_room_id\` are the same thing.\n\n---\n\n**Support:** steve@gas.travel`,
            "contact": {
                "name": "GAS Support",
                "email": "steve@gas.travel",
                "url": "https://gas.travel"
            }
        },
        "servers": [
            {
                "url": "https://admin.gas.travel",
                "description": "Production"
            }
        ],
        "security": [
            { "ApiKey": [] }
        ],
        "components": {
            "securitySchemes": {
                "ApiKey": {
                    "type": "apiKey",
                    "in": "header",
                    "name": "X-API-Key",
                    "description": "Your partner API key. For /api/partner/* endpoints this is sent as a header. For /api/elevate/* endpoints the same key goes in the URL path."
                }
            },
            "schemas": {
                "Tenant": {
                    "type": "object",
                    "required": ["tenant_id", "business_name"],
                    "properties": {
                        "tenant_id": { "type": "string", "description": "Your unique identifier for this tenant", "example": "tenant-001" },
                        "business_name": { "type": "string", "description": "Display name for the business", "example": "Sunshine Apartments" },
                        "contact_email": { "type": "string", "format": "email", "example": "owner@sunshineapts.com" },
                        "contact_phone": { "type": "string", "example": "+1234567890" },
                        "country": { "type": "string", "description": "Two-letter country code", "example": "US" },
                        "timezone": { "type": "string", "example": "America/New_York" }
                    }
                },
                "Property": {
                    "type": "object",
                    "properties": {
                        "name": { "type": "string", "example": "Beach Studio" },
                        "address": { "type": "string", "example": "123 Beach Road" },
                        "city": { "type": "string", "example": "Miami" },
                        "state": { "type": "string", "example": "FL" },
                        "country": { "type": "string", "example": "US" },
                        "zip": { "type": "string", "example": "33139" },
                        "latitude": { "type": "number", "example": 25.7617 },
                        "longitude": { "type": "number", "example": -80.1918 },
                        "property_type": { "type": "string", "example": "vacation_rental" },
                        "description": { "type": "string", "example": "Luxury beachfront accommodation" }
                    }
                },
                "Room": {
                    "type": "object",
                    "properties": {
                        "name": { "type": "string", "example": "Studio Room A" },
                        "external_id": { "type": "string", "description": "Your reference for this room", "example": "ROOM-001" },
                        "max_guests": { "type": "integer", "example": 2 },
                        "bedrooms": { "type": "integer", "example": 1 },
                        "bathrooms": { "type": "integer", "example": 1 },
                        "description": { "type": "string", "example": "Cozy studio with ocean view" },
                        "currency": { "type": "string", "example": "USD" }
                    }
                },
                "CalendarEntry": {
                    "type": "object",
                    "properties": {
                        "date": { "type": "string", "format": "date", "example": "2026-03-15" },
                        "price": { "type": "number", "example": 200.0 },
                        "currency": { "type": "string", "example": "CHF" },
                        "min_stay": { "type": "integer", "example": 2 },
                        "available": { "type": "boolean", "example": true },
                        "is_blocked": { "type": "boolean", "example": false }
                    }
                },
                "Image": {
                    "type": "object",
                    "properties": {
                        "url": { "type": "string", "format": "uri", "example": "https://example.com/room1-main.jpg" },
                        "caption": { "type": "string", "example": "Main bedroom view" },
                        "sort_order": { "type": "integer", "example": 1 },
                        "external_id": { "type": "string", "example": "img-001" }
                    }
                },
                "Website": {
                    "type": "object",
                    "properties": {
                        "name": { "type": "string", "example": "Beach Studios Miami" },
                        "subdomain": { "type": "string", "example": "beach-studios" },
                        "description": { "type": "string", "example": "Luxury beachfront accommodation" }
                    }
                },
                "CheckoutConfig": {
                    "type": "object",
                    "properties": {
                        "payment_options": {
                            "type": "object",
                            "properties": {
                                "stripe": { "type": "boolean", "description": "Enable Stripe card payments", "example": true },
                                "card_guarantee": { "type": "boolean", "description": "Enable Enigma Vault card guarantee", "example": true },
                                "pay_at_property": {
                                    "type": "object",
                                    "properties": {
                                        "enabled": { "type": "boolean", "example": true },
                                        "mode": { "type": "string", "enum": ["book_only", "bank_required", "pay_optional"], "example": "pay_optional" },
                                        "bank_details": {
                                            "type": "object",
                                            "properties": {
                                                "account_name": { "type": "string", "example": "Sunshine Apartments SRL" },
                                                "iban": { "type": "string", "example": "CH93 0076 2011 6238 5295 7" },
                                                "bank_name": { "type": "string", "example": "UBS Switzerland" },
                                                "bic": { "type": "string", "example": "UBSWCHZH80A" }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "SuccessResponse": {
                    "type": "object",
                    "properties": {
                        "success": { "type": "boolean", "example": true }
                    }
                },
                "ErrorResponse": {
                    "type": "object",
                    "properties": {
                        "success": { "type": "boolean", "example": false },
                        "error": { "type": "string", "example": "Description of what went wrong" }
                    }
                }
            }
        },
        "tags": [
            { "name": "Tenants", "description": "Create and manage client accounts (tenants)" },
            { "name": "Properties & Rooms", "description": "Push properties with rooms, update, delete" },
            { "name": "Images", "description": "Upload and manage room and property images" },
            { "name": "Room Details", "description": "Amenities, bedrooms, bathrooms" },
            { "name": "Pricing & Availability", "description": "Calendar, pricing, and availability management" },
            { "name": "Room Types", "description": "Group identical rooms for display purposes" },
            { "name": "Websites", "description": "Create, deploy, and manage booking websites" },
            { "name": "Website Content", "description": "Update website sections (hero, about, footer, etc.)" },
            { "name": "Stripe & Payments", "description": "Configure Stripe keys and checkout options" },
            { "name": "Custom Domains", "description": "Connect custom domains to websites" },
            { "name": "Webhooks", "description": "Configure and diagnose webhook integrations" },
            { "name": "Analytics", "description": "Tenant and website analytics" },
            { "name": "Lifecycle", "description": "Reservations, deletions, and lifecycle management" }
        ],
        "paths": {
            // ===== TENANTS =====
            "/api/partner/tenants": {
                "post": {
                    "tags": ["Tenants"],
                    "summary": "Create Tenant",
                    "description": "Create a new tenant (client account). If the tenant_id already exists, returns the existing tenant.",
                    "requestBody": {
                        "required": true,
                        "content": {
                            "application/json": {
                                "schema": { "$ref": "#/components/schemas/Tenant" },
                                "example": {
                                    "tenant_id": "tenant-001",
                                    "business_name": "Sunshine Apartments",
                                    "contact_email": "owner@sunshineapts.com",
                                    "contact_phone": "+1234567890",
                                    "country": "US",
                                    "timezone": "America/New_York"
                                }
                            }
                        }
                    },
                    "responses": {
                        "200": {
                            "description": "Tenant created or already exists",
                            "content": {
                                "application/json": {
                                    "example": {
                                        "success": true,
                                        "tenant": {
                                            "id": 15,
                                            "tenant_id": "tenant-001",
                                            "account_id": 141
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "get": {
                    "tags": ["Tenants"],
                    "summary": "List All Tenants",
                    "description": "Get all tenants for your partner account.",
                    "responses": {
                        "200": {
                            "description": "List of tenants"
                        }
                    }
                }
            },
            "/api/partner/tenants/{tenantId}": {
                "get": {
                    "tags": ["Tenants"],
                    "summary": "Get Tenant",
                    "description": "Get a single tenant's details.",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" }, "description": "Your tenant_id" }
                    ],
                    "responses": { "200": { "description": "Tenant details" } }
                },
                "put": {
                    "tags": ["Tenants"],
                    "summary": "Update Tenant",
                    "description": "Send only the fields you want to update.",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "content": {
                            "application/json": {
                                "example": { "business_name": "New Business Name", "contact_email": "new@email.com" }
                            }
                        }
                    },
                    "responses": { "200": { "description": "Tenant updated" } }
                },
                "delete": {
                    "tags": ["Lifecycle"],
                    "summary": "Delete Tenant",
                    "description": "Permanently removes tenant and ALL associated data. Irreversible. Blocked if active bookings exist.",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "responses": { "200": { "description": "Tenant deleted" } }
                }
            },
            
            // ===== PROPERTIES & ROOMS =====
            "/api/elevate/_KEY_/property": {
                "post": {
                    "tags": ["Properties & Rooms"],
                    "summary": "Push Property with Rooms",
                    "description": "Create a property with one or more rooms. Returns property_id and unit_id for each room. **Save the unit_id values** — you need them for room types, availability, images, and website assignments.",
                    
                    "parameters": [
                    ],
                    "requestBody": {
                        "required": true,
                        "content": {
                            "application/json": {
                                "example": {
                                    "client": { "action": "tenant", "tenant_id": "tenant-001" },
                                    "property": {
                                        "name": "Beach Studio",
                                        "address": "123 Beach Road",
                                        "city": "Miami",
                                        "state": "FL",
                                        "country": "US",
                                        "zip": "33139",
                                        "latitude": 25.7617,
                                        "longitude": -80.1918,
                                        "property_type": "vacation_rental",
                                        "description": "Luxury beachfront accommodation"
                                    },
                                    "rooms": [
                                        {
                                            "name": "Studio Room A",
                                            "external_id": "ROOM-001",
                                            "max_guests": 2,
                                            "bedrooms": 1,
                                            "bathrooms": 1,
                                            "description": "Cozy studio with ocean view",
                                            "currency": "USD"
                                        }
                                    ]
                                }
                            }
                        }
                    },
                    "responses": {
                        "200": {
                            "description": "Property and rooms created",
                            "content": {
                                "application/json": {
                                    "example": {
                                        "success": true,
                                        "property_id": 392,
                                        "rooms": [
                                            { "unit_id": 1026, "external_id": "ROOM-001", "name": "Studio Room A" }
                                        ]
                                    }
                                }
                            }
                        }
                    }
                }
            },
            "/api/elevate/_KEY_/property/{propertyId}": {
                "put": {
                    "tags": ["Properties & Rooms"],
                    "summary": "Update Property",
                    "description": "Send only the fields you want to update inside a property object.",
                    
                    "parameters": [
                        { "name": "propertyId", "in": "path", "required": true, "schema": { "type": "integer" } }
                    ],
                    "requestBody": {
                        "content": {
                            "application/json": {
                                "example": { "property": { "name": "Updated Beach Studio", "description": "New description" } }
                            }
                        }
                    },
                    "responses": { "200": { "description": "Property updated" } }
                },
                "delete": {
                    "tags": ["Lifecycle"],
                    "summary": "Delete Property",

                    "tags": ["Stripe & Payments"],
                    "summary": "Get Tenant Stripe Status",
                    "description": "Get Stripe status for all properties belonging to a tenant.",
                    "parameters": [ { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" } } ],
                    "responses": { "200": { "description": "Stripe status per property" } }
                }
            },
            "/api/partner/properties/{property_id}/checkout": {
                "put": {
                    "tags": ["Stripe & Payments"],
                    "summary": "Configure Checkout",
                    "description": "Configure payment options for checkout. Multiple payment methods can be enabled simultaneously.\n\n**Pay at Property modes:**\n- `book_only` — Confirmed immediately, no payment\n- `bank_required` — Request (pending), bank details shown\n- `pay_optional` — Confirmed immediately, bank details shown",
                    "parameters": [ { "name": "property_id", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "requestBody": {
                        "content": {
                            "application/json": {
                                "schema": { "$ref": "#/components/schemas/CheckoutConfig" },
                                "examples": {
                                    "all-options": {
                                        "summary": "All three payment options",
                                        "value": {
                                            "payment_options": {
                                                "stripe": true,
                                                "card_guarantee": true,
                                                "pay_at_property": {
                                                    "enabled": true,
                                                    "mode": "pay_optional",
                                                    "bank_details": {
                                                        "account_name": "Mountain Lodge GmbH",
                                                        "iban": "CH93 0076 2011 6238 5295 7",
                                                        "bank_name": "UBS Switzerland",
                                                        "bic": "UBSWCHZH80A"
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    "card-only": {
                                        "summary": "Card only",
                                        "value": {
                                            "payment_options": { "stripe": true, "card_guarantee": false, "pay_at_property": { "enabled": false } }
                                        }
                                    },
                                    "book-only": {
                                        "summary": "Book only, no payment",
                                        "value": {
                                            "payment_options": { "stripe": false, "card_guarantee": false, "pay_at_property": { "enabled": true, "mode": "book_only" } }
                                        }
                                    }
                                }
                            }
                        }
                    },
                    "responses": { "200": { "description": "Checkout configuration saved" } }
                },
                "get": {
                    "tags": ["Stripe & Payments"],
                    "summary": "Get Checkout Configuration",
                    "parameters": [ { "name": "property_id", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "responses": { "200": { "description": "Current checkout configuration" } }
                }
            },
            
            // ===== CUSTOM DOMAINS =====
            "/api/partner/websites/{websiteId}/domain": {
                "get": {
                    "tags": ["Custom Domains"],
                    "summary": "Get Domain Status",
                    "description": "Get domain status and DNS records.",
                    "parameters": [ { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "responses": { "200": { "description": "Domain status" } }
                },
                "put": {
                    "tags": ["Custom Domains"],
                    "summary": "Connect Custom Domain",
                    "description": "Website must be deployed first. DNS must be configured before calling. SSL is provisioned automatically.",
                    "parameters": [ { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "requestBody": {
                        "content": { "application/json": { "example": { "domain": "www.mysite.com" } } }
                    },
                    "responses": { "200": { "description": "Domain connected" } }
                },
                "delete": {
                    "tags": ["Custom Domains"],
                    "summary": "Remove Custom Domain",
                    "parameters": [ { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "responses": { "200": { "description": "Domain removed" } }
                }
            },
            
            // ===== WEBHOOKS =====
            "/api/partner/webhooks": {
                "put": {
                    "tags": ["Webhooks"],
                    "summary": "Configure Webhooks",
                    "description": "GAS fires webhooks for booking events. Uses HMAC-SHA256 signatures, automatic retries (3 attempts with exponential backoff).\n\n**Supported events:** booking.created, booking.cancelled\n\n**Important:** Save the webhook_secret — you need it to verify incoming signatures.",
                    "requestBody": {
                        "content": {
                            "application/json": {
                                "example": {
                                    "booking_created": "https://your-server.com/webhooks/gas",
                                    "booking_cancelled": "https://your-server.com/webhooks/gas"
                                }
                            }
                        }
                    },
                    "responses": { "200": { "description": "Webhooks configured, returns webhook_secret" } }
                },
                "get": {
                    "tags": ["Webhooks"],
                    "summary": "Get Webhook Configuration",
                    "responses": { "200": { "description": "Current webhook configuration" } }
                },
                "delete": {
                    "tags": ["Webhooks"],
                    "summary": "Delete Webhooks",
                    "responses": { "200": { "description": "Webhooks removed" } }
                }
            },
            "/api/partner/webhooks/diagnose": {
                "get": {
                    "tags": ["Webhooks"],
                    "summary": "Diagnose Webhooks",
                    "description": "Check webhook health, recent deliveries, and any failures.",
                    "responses": { "200": { "description": "Webhook diagnostics" } }
                }
            },
            
            // ===== ANALYTICS =====
            "/api/partner/tenants/{tenantId}/analytics": {
                "get": {
                    "tags": ["Analytics"],
                    "summary": "Get Tenant Analytics",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" } },
                        { "name": "period", "in": "query", "schema": { "type": "string", "example": "30d" }, "description": "Days to look back (7d, 30d, 90d)" },
                        { "name": "from_date", "in": "query", "schema": { "type": "string", "format": "date" }, "description": "Start date (overrides period)" },
                        { "name": "to_date", "in": "query", "schema": { "type": "string", "format": "date" }, "description": "End date (overrides period)" }
                    ],
                    "responses": { "200": { "description": "Analytics data" } }
                }
            },
            "/api/partner/websites/{websiteId}/analytics": {
                "get": {
                    "tags": ["Analytics"],
                    "summary": "Get Website Analytics",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "period", "in": "query", "schema": { "type": "string" } },
                        { "name": "from_date", "in": "query", "schema": { "type": "string", "format": "date" } },
                        { "name": "to_date", "in": "query", "schema": { "type": "string", "format": "date" } }
                    ],
                    "responses": { "200": { "description": "Website analytics" } }
                }
            },
            
            // ===== LIFECYCLE =====
            "/api/partner/v1/reservations/{bookingId}": {
                "put": {
                    "tags": ["Lifecycle"],
                    "summary": "Update Reservation",
                    "description": "Send only fields to update. Date changes automatically update availability.",
                    "parameters": [ { "name": "bookingId", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "requestBody": {
                        "content": { "application/json": { "example": { "check_in": "2026-03-20", "check_out": "2026-03-25" } } }
                    },
                    "responses": { "200": { "description": "Reservation updated" } }
                },
                "delete": {
                    "tags": ["Lifecycle"],
                    "summary": "Delete Reservation",
                    "description": "Permanently removes the booking and frees dates.",
                    "parameters": [ { "name": "bookingId", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "responses": { "200": { "description": "Reservation deleted" } }
                }
            }
        }
    };
    
    // Initialize Swagger UI
    window.onload = function() {
        SwaggerUIBundle({
            spec: spec,
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            plugins: [
                SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "StandaloneLayout",
            defaultModelsExpandDepth: 2,
            defaultModelExpandDepth: 2,
            docExpansion: "list",
            filter: true,
            showExtensions: true,
            tryItOutEnabled: true,
            requestInterceptor: function(req) {
                // Auto-inject API key into /api/elevate/_KEY_/ URLs
                const apiKey = req.headers['X-API-Key'];
                if (apiKey && req.url.includes('/api/elevate/')) {
                    req.url = req.url.replace(/\/api\/elevate\/[^/]*\//, '/api/elevate/' + apiKey + '/');
                }
                return req;
            }
        });
    };
    </script>
</body>
