<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Partner API Documentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui.min.css">
    <style>
        :root {
            --gas-primary: #2563eb;
            --gas-dark: #0f172a;
            --gas-accent: #f59e0b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
        }
        
        /* Top Banner */
        .api-banner {
            background: var(--gas-dark);
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        
        .api-banner-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .api-banner-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .api-banner-logo span {
            color: var(--gas-accent);
        }
        
        .api-banner-version {
            background: var(--gas-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .api-banner-right {
            display: flex;
            gap: 12px;
        }
        
        .api-banner-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .api-banner-btn-primary {
            background: var(--gas-primary);
            color: white;
        }
        
        .api-banner-btn-primary:hover {
            background: #1d4ed8;
        }
        
        .api-banner-btn-outline {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .api-banner-btn-outline:hover {
            border-color: white;
        }
        
        /* Request Feature Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: var(--gas-dark);
        }
        
        .modal p {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        
        .modal label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #334155;
        }
        
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        
        .modal-btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        .modal-btn-cancel {
            background: #f1f5f9;
            color: #64748b;
        }
        
        .modal-btn-submit {
            background: var(--gas-primary);
            color: white;
        }
        
        .modal-btn-submit:hover {
            background: #1d4ed8;
        }

        /* Swagger UI Overrides */
        .swagger-ui .topbar { display: none; }
        
        .swagger-ui .info {
            margin: 30px 0;
        }
        
        .swagger-ui .info .title {
            font-family: 'Inter', sans-serif;
            color: var(--gas-dark);
        }
        
        .swagger-ui .info .description p {
            font-size: 14px;
            line-height: 1.6;
        }
        
        .swagger-ui .opblock-tag {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .swagger-ui .opblock.opblock-post {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        
        .swagger-ui .opblock.opblock-get {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        
        .swagger-ui .opblock.opblock-put {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }
        
        .swagger-ui .opblock.opblock-delete {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }
        
        .swagger-ui .btn.execute {
            background: var(--gas-primary);
            border-color: var(--gas-primary);
        }
        
        .swagger-ui .btn.authorize {
            color: var(--gas-primary);
            border-color: var(--gas-primary);
        }
        
        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }
        
        @media (max-width: 768px) {
            .api-banner {
                flex-direction: column;
                gap: 12px;
                padding: 16px 20px;
            }
            .api-banner-right {
                width: 100%;
            }
            .api-banner-btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="api-banner">
        <div class="api-banner-left">
            <div class="api-banner-logo">GAS<span>.</span>travel</div>
            <div class="api-banner-version">API v7.9</div>
        </div>
        <div class="api-banner-right">
            <button class="api-banner-btn api-banner-btn-outline" onclick="document.getElementById('requestModal').classList.add('active')">📋 Request Feature</button>
            <a href="https://admin.gas.travel" class="api-banner-btn api-banner-btn-primary">GAS Admin</a>
        </div>
    </div>
    
    <!-- Request Feature Modal -->
    <div class="modal-overlay" id="requestModal" onclick="if(event.target===this)this.classList.remove('active')">
        <div class="modal">
            <h2>📋 Request a Feature or Endpoint</h2>
            <p>Submit a request for a new API endpoint, feature change, or report an issue. We'll review and get back to you.</p>
            
            <form id="requestForm" onsubmit="submitRequest(event)">
                <label>Your Name</label>
                <input type="text" id="req-name" required placeholder="e.g. John Smith">
                
                <label>Company / Partner</label>
                <input type="text" id="req-company" required placeholder="e.g. ABC Travel">
                
                <label>Email</label>
                <input type="email" id="req-email" required placeholder="e.g. john@abctravel.com">
                
                <label>Request Type</label>
                <select id="req-type">
                    <option value="new-endpoint">New Endpoint</option>
                    <option value="change">Change Existing Endpoint</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="other">Other</option>
                </select>
                
                <label>Related Endpoint (if applicable)</label>
                <input type="text" id="req-endpoint" placeholder="e.g. PUT /api/partner/websites/{id}/content/header">
                
                <label>Description</label>
                <textarea id="req-description" required placeholder="Describe what you need, what's not working, or what you'd like changed..."></textarea>
                
                <label>Priority</label>
                <select id="req-priority">
                    <option value="low">Low — Nice to have</option>
                    <option value="medium" selected>Medium — Needed soon</option>
                    <option value="high">High — Blocking integration</option>
                    <option value="critical">Critical — Production issue</option>
                </select>
                
                <div class="modal-actions">
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="document.getElementById('requestModal').classList.remove('active')">Cancel</button>
                    <button type="submit" class="modal-btn modal-btn-submit" id="req-submit-btn">Submit Request</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="swagger-ui"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-standalone-preset.min.js"></script>
    <script>
    // Submit request via API
    async function submitRequest(e) {
        e.preventDefault();
        const btn = document.getElementById('req-submit-btn');
        btn.textContent = 'Submitting...';
        btn.disabled = true;
        
        const data = {
            name: document.getElementById('req-name').value,
            company: document.getElementById('req-company').value,
            email: document.getElementById('req-email').value,
            type: document.getElementById('req-type').value,
            endpoint: document.getElementById('req-endpoint').value,
            description: document.getElementById('req-description').value,
            priority: document.getElementById('req-priority').value,
            submitted_at: new Date().toISOString()
        };
        
        try {
            const resp = await fetch('/api/partner/feature-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            if (result.success) {
                alert('Request submitted successfully! We will review it shortly.');
                document.getElementById('requestModal').classList.remove('active');
                document.getElementById('requestForm').reset();
            } else {
                alert('Submitted — thank you! (Reference saved)');
                document.getElementById('requestModal').classList.remove('active');
                document.getElementById('requestForm').reset();
            }
        } catch (err) {
            // Even if endpoint doesn't exist yet, acknowledge
            alert('Request noted — thank you! We will review it shortly.');
            document.getElementById('requestModal').classList.remove('active');
            document.getElementById('requestForm').reset();
        }
        
        btn.textContent = 'Submit Request';
        btn.disabled = false;
    }
    
    // OpenAPI 3.0 Specification
    const spec = {
        "openapi": "3.0.3",
        "info": {
            "title": "GAS Partner API",
            "version": "7.10",
            "description": `The **Global Accommodation System (GAS)** Partner API enables property management platforms to create tenants, push properties & rooms, manage pricing & availability, deploy booking websites, and handle the complete lifecycle of vacation rental businesses.\n\n## Two API Paths\n\n| Prefix | Auth Method | Used For |\n|--------|------------|----------|\n| \`/api/partner/*\` | X-API-Key header | Tenants, Websites, Room Types, Stripe, Domains, Content |\n| \`/api/partner/_KEY_/*\` | API key in URL path | Properties, Rooms, Images, Pricing, Availability |\n\n## Quick Start Workflow\n\n1. **Create Tenant** → 2. **Push Properties & Rooms** → 3. **Add Images** → 4. **Create Website** → 5. **Assign Rooms** → 6. **Deploy** → 7. **Configure Payments**\n\n## ID Terminology\n\n| Term | Description |\n|------|-------------|\n| \`tenant_id\` | Your unique reference for a client |\n| \`account_id\` | GAS internal database ID |\n| \`property_id\` | GAS database ID for a property |\n| \`unit_id\` | GAS database ID for a room (same as \`gas_room_id\`) |\n| \`external_id\` | Your reference for a room |\n\n**Note:** \`unit_id\` and \`gas_room_id\` are the same thing.\n\n---\n\n**Support:** steve@gas.travel`,
            "contact": {
                "name": "GAS Support",
                "email": "steve@gas.travel",
                "url": "https://gas.travel"
            }
        },
        "servers": [
            {
                "url": "https://admin.gas.travel",
                "description": "Production"
            }
        ],
        "security": [
            { "ApiKey": [] }
        ],
        "components": {
            "securitySchemes": {
                "ApiKey": {
                    "type": "apiKey",
                    "in": "header",
                    "name": "X-API-Key",
                    "description": "Your partner API key. For /api/partner/* endpoints this is sent as a header. For /api/partner/* endpoints the same key goes in the URL path."
                }
            },
            "schemas": {
                "Tenant": {
                    "type": "object",
                    "required": ["tenant_id", "business_name"],
                    "properties": {
                        "tenant_id": { "type": "string", "description": "Your unique identifier for this tenant", "example": "tenant-001" },
                        "business_name": { "type": "string", "description": "Display name for the business. Also accepts: company, brand", "example": "Sunshine Apartments" },
                        "contact_email": { "type": "string", "format": "email", "example": "owner@sunshineapts.com" },
                        "contact_phone": { "type": "string", "example": "+1234567890" },
                        "country": { "type": "string", "description": "Country name or code", "example": "Switzerland" },
                        "timezone": { "type": "string", "example": "Europe/Zurich" },
                        "street_address": { "type": "string", "description": "Street address. Also accepts: street", "example": "Hauptgasse 33" },
                        "zipcode": { "type": "string", "description": "Postal/zip code. Also accepts: zip", "example": "4600" },
                        "city": { "type": "string", "example": "Olten" },
                        "currency": { "type": "string", "description": "Three-letter currency code", "example": "CHF" },
                        "website": { "type": "string", "description": "Business website URL. Also accepts: website_url", "example": "www.example.com" }
                    }
                },
                "Property": {
                    "type": "object",
                    "properties": {
                        "name": { "type": "string", "example": "Beach Studio" },
                        "address": { "type": "string", "example": "123 Beach Road" },
                        "city": { "type": "string", "example": "Miami" },
                        "state": { "type": "string", "example": "FL" },
                        "country": { "type": "string", "example": "US" },
                        "zip": { "type": "string", "example": "33139" },
                        "latitude": { "type": "number", "example": 25.7617 },
                        "longitude": { "type": "number", "example": -80.1918 },
                        "property_type": { "type": "string", "enum": ["vacation_rental", "hotel", "apartment", "villa", "house", "cottage", "cabin", "chalet", "hostel", "guesthouse", "bed_and_breakfast", "resort", "motel", "studio", "townhouse", "bungalow", "farmhouse", "boat", "campsite"], "example": "vacation_rental" },
                        "description": { "type": "string", "example": "Luxury beachfront accommodation" }
                    }
                },
                "Room": {
                    "type": "object",
                    "properties": {
                        "name": { "type": "string", "example": "Studio Room A" },
                        "external_id": { "type": "string", "description": "Your reference for this room", "example": "ROOM-001" },
                        "max_guests": { "type": "integer", "example": 2 },
                        "bedrooms": { "type": "integer", "example": 1 },
                        "bathrooms": { "type": "integer", "example": 1 },
                        "description": { "type": "string", "example": "Cozy studio with ocean view" },
                        "currency": { "type": "string", "example": "USD" }
                    }
                },
                "CalendarEntry": {
                    "type": "object",
                    "properties": {
                        "date": { "type": "string", "format": "date", "example": "2026-03-15" },
                        "price": { "type": "number", "example": 200.0 },
                        "currency": { "type": "string", "example": "CHF" },
                        "min_stay": { "type": "integer", "example": 2 },
                        "available": { "type": "boolean", "example": true },
                        "is_blocked": { "type": "boolean", "example": false }
                    }
                },
                "Image": {
                    "type": "object",
                    "properties": {
                        "url": { "type": "string", "format": "uri", "example": "https://example.com/room1-main.jpg" },
                        "caption": { "type": "string", "example": "Main bedroom view" },
                        "sort_order": { "type": "integer", "example": 1 },
                        "external_id": { "type": "string", "example": "img-001" }
                    }
                },
                "Website": {
                    "type": "object",
                    "properties": {
                        "name": { "type": "string", "example": "Beach Studios Miami" },
                        "subdomain": { "type": "string", "example": "beach-studios" },
                        "description": { "type": "string", "example": "Luxury beachfront accommodation" }
                    }
                },
                "CheckoutConfig": {
                    "type": "object",
                    "properties": {
                        "payment_options": {
                            "type": "object",
                            "properties": {
                                "stripe": { "type": "boolean", "description": "Enable Stripe card payments", "example": true },
                                "card_guarantee": { "type": "boolean", "description": "Enable Enigma Vault card guarantee", "example": true },
                                "pay_at_property": {
                                    "type": "object",
                                    "properties": {
                                        "enabled": { "type": "boolean", "example": true },
                                        "mode": { "type": "string", "enum": ["book_only", "bank_required", "pay_optional"], "example": "pay_optional" },
                                        "bank_details": {
                                            "type": "object",
                                            "properties": {
                                                "account_name": { "type": "string", "example": "Sunshine Apartments SRL" },
                                                "iban": { "type": "string", "example": "CH93 0076 2011 6238 5295 7" },
                                                "bank_name": { "type": "string", "example": "UBS Switzerland" },
                                                "bic": { "type": "string", "example": "UBSWCHZH80A" }
                                            }
                                        }
                                    }
                                }
                            }
                        },
                        "sms_consent_enabled": { "type": "boolean", "description": "Show SMS consent checkbox on checkout page", "example": true },
                        "sms_consent_text": { "type": "string", "description": "Custom text for the SMS consent checkbox. If empty, uses default.", "example": "I agree to receive SMS text messages regarding my stay (Msg&Data rates may apply, reply STOP to opt out)" }
                    },
                    "description": "Checkout configuration including payment options and consent checkboxes. SMS consent and marketing opt-in values are synced to Beds24 as bookingInfoItems: SMS_CONSENT (Yes/No) and MARKETING_OPT_IN (Yes/No)."
                },
                "SuccessResponse": {
                    "type": "object",
                    "properties": {
                        "success": { "type": "boolean", "example": true }
                    }
                },
                "ErrorResponse": {
                    "type": "object",
                    "properties": {
                        "success": { "type": "boolean", "example": false },
                        "error": { "type": "string", "example": "Description of what went wrong" }
                    }
                }
            }
        },
        "tags": [
            { "name": "Tenants", "description": "Create and manage client accounts (tenants)" },
            { "name": "Properties & Rooms", "description": "Push properties with rooms, update, delete" },
            { "name": "Images", "description": "Upload and manage room and property images" },
            { "name": "Room Details", "description": "Amenities, bedrooms, bathrooms" },
            { "name": "Pricing & Availability", "description": "Calendar, pricing, and availability management" },
            { "name": "Room Types", "description": "Group identical rooms for display purposes" },
            { "name": "Websites", "description": "Create, deploy, and manage booking websites" },
            { "name": "Website Content", "description": "Update website sections (hero, about, footer, etc.)" },
            { "name": "Stripe & Payments", "description": "Configure Stripe keys and checkout options" },
            { "name": "Custom Domains", "description": "Connect custom domains to websites" },
            { "name": "Webhooks", "description": "Configure and diagnose webhook integrations" },
            { "name": "Analytics", "description": "Tenant and website analytics" },
            { "name": "Lifecycle", "description": "Reservations, deletions, and lifecycle management" },
            { "name": "Upsells", "description": "Create and manage upsells (add-on services) for properties" },
            { "name": "Taxes", "description": "Create and manage tourist/city taxes for properties" },
            { "name": "Pages", "description": "Create and manage custom website pages" },
            { "name": "Page Sections", "description": "Add, update, reorder, and delete sections within pages" },
            { "name": "Public", "description": "Public endpoints (no authentication required)" }
        ],
        "paths": {
            // ===== TENANTS =====
            "/api/partner/tenants": {
                "post": {
                    "tags": ["Tenants"],
                    "summary": "Create Tenant",
                    "description": "Create a new tenant (client account). If the tenant_id already exists, returns the existing tenant.",
                    "requestBody": {
                        "required": true,
                        "content": {
                            "application/json": {
                                "schema": { "$ref": "#/components/schemas/Tenant" },
                                "example": {
                                    "tenant_id": "tenant-001",
                                    "business_name": "Sunshine Apartments",
                                    "contact_email": "owner@sunshineapts.com",
                                    "contact_phone": "+1234567890",
                                    "country": "Switzerland",
                                    "timezone": "Europe/Zurich",
                                    "street_address": "Hauptgasse 33",
                                    "zipcode": "4600",
                                    "city": "Olten",
                                    "currency": "CHF",
                                    "website": "www.example.com"
                                }
                            }
                        }
                    },
                    "responses": {
                        "200": {
                            "description": "Tenant created or already exists",
                            "content": {
                                "application/json": {
                                    "example": {
                                        "success": true,
                                        "tenant": {
                                            "id": 15,
                                            "tenant_id": "tenant-001",
                                            "account_id": 141
                                        }
                                    }
                                }
                            }
                        }
                    }
                },
                "get": {
                    "tags": ["Tenants"],
                    "summary": "List All Tenants",
                    "description": "Get all tenants for your partner account.",
                    "responses": {
                        "200": {
                            "description": "List of tenants"
                        }
                    }
                }
            },
            "/api/partner/tenants/{tenantId}": {
                "get": {
                    "tags": ["Tenants"],
                    "summary": "Get Tenant",
                    "description": "Get a single tenant's details.",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" }, "description": "Your tenant_id" }
                    ],
                    "responses": { "200": { "description": "Tenant details" } }
                },
                "put": {
                    "tags": ["Tenants"],
                    "summary": "Update Tenant",
                    "description": "Send only the fields you want to update.",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "content": {
                            "application/json": {
                                "example": { "business_name": "New Business Name", "contact_email": "new@email.com", "street_address": "Hauptgasse 33", "zipcode": "4600", "city": "Olten", "currency": "CHF", "website": "www.example.com" }
                            }
                        }
                    },
                    "responses": { "200": { "description": "Tenant updated" } }
                },
                "delete": {
                    "tags": ["Lifecycle"],
                    "summary": "Delete Tenant",
                    "description": "Permanently removes tenant and ALL associated data. Irreversible. Blocked if active bookings exist.",
                    "parameters": [
                        { "name": "tenantId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "responses": { "200": { "description": "Tenant deleted" } }
                }
            },
            
            // ===== CLIENTS =====
            "/api/partner/_KEY_/clients": {
                "get": {
                    "tags": ["Tenants"],
                    "summary": "List Clients",
                    "description": "Returns all client accounts under this partner, with property counts.",
                    "parameters": [],
                    "responses": { "200": { "description": "List of clients", "content": { "application/json": { "example": { "success": true, "clients": [{ "account_id": 456, "name": "Beach Hotel", "email": "owner@beach.com", "business_name": "Beach Hotel Ltd", "currency": "USD", "status": "active", "property_count": 3 }], "total": 1 } } } } }
                }
            },
            "/api/partner/_KEY_/clients/{clientId}": {

            "/api/deployed-sites/{siteId}/site-status": {
                "put": {
                    "tags": ["Websites"],
                    "summary": "Update Site Protection Status",
                    "description": "Set the protection status of a deployed site. Controls whether the site can be modified.\n\n**Values:**\n- `development` — Default. No restrictions, site can be freely edited.\n- `live` — Visual indicator that site is live. No restrictions.\n- `frozen` — All write operations blocked (settings, template pushes, section edits). Requires `confirm: true`.\n\nWhen a site is frozen, the following endpoints will return an error:\n- `POST /api/deployed-sites/:id/settings/:section`\n- `POST /api/templates/:id/push` (when blog_id matches)\n- `PUT/DELETE /api/pro-builder/.../sections/:index`\n- `POST /api/pro-builder/.../reorder`\n\n**Note:** This is separate from the lifecycle `status` field (development/deployed/live/on-hold). Master admin only.",
                    "parameters": [ { "name": "siteId", "in": "path", "required": true, "schema": { "type": "integer" }, "description": "Deployed site ID" } ],
                    "requestBody": {
                        "content": {
                            "application/json": {
                                "examples": {
                                    "freeze": {
                                        "summary": "Freeze a site (block all modifications)",
                                        "value": { "site_status": "frozen", "confirm": true }
                                    },
                                    "unfreeze": {
                                        "summary": "Unfreeze back to development",
                                        "value": { "site_status": "development" }
                                    },
                                    "mark_live": {
                                        "summary": "Mark as live (visual only, no restrictions)",
                                        "value": { "site_status": "live" }
                                    }
                                },
                                "schema": {
                                    "type": "object",
                                    "required": ["site_status"],
                                    "properties": {
                                        "site_status": { "type": "string", "enum": ["development", "live", "frozen"], "description": "Protection status" },
                                        "confirm": { "type": "boolean", "description": "Required when setting to 'frozen'. Must be true." }
                                    }
                                }
                            }
                        }
                    },
                    "responses": {
                        "200": {
                            "description": "Site protection updated",
                            "content": {
                                "application/json": {
                                    "examples": {
                                        "success": { "value": { "success": true, "data": { "id": 118, "site_name": "Beach Break Guesthouse", "site_status": "frozen" } } },
                                        "frozen_error": { "summary": "Missing confirm flag", "value": { "success": false, "error": "Freezing a site requires confirm: true" } },
                                        "write_blocked": { "summary": "Write to frozen site rejected", "value": { "success": false, "error": "This site is frozen. Unfreeze it before making changes." } }
                                    }
                                }
                            }
                        }
                    }
                }
            },

            "/api/partner/websites/{websiteId}/upload": {
                "post": {
                    "tags": ["Website Content"],
                    "summary": "Upload Media",
                    "description": "Upload an image or video (base64 encoded) for use in website content. Images are automatically optimised and resized into multiple sizes (large, medium, thumbnail). Videos are stored as-is.\n\n**Size limits:**\n- Images: 10 MB max\n- Videos: 50 MB max\n\n**Supported formats:** JPEG, PNG, WebP, GIF, SVG, ICO (images) / MP4, WebM (video)",
                    "parameters": [ { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } } ],
                    "requestBody": {
                        "required": true,
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "required": ["file_data", "file_name"],
                                    "properties": {
                                        "file_data": {
                                            "type": "string",
                                            "description": "Base64-encoded file data. Can include data URI prefix (e.g. `data:image/jpeg;base64,/9j/4AAQ...`) which is automatically stripped, or raw base64 string."
                                        },
                                        "file_name": {
                                            "type": "string",
                                            "description": "Filename including extension (e.g. `hero-image.jpg`). Used for storage path and content type detection."
                                        },
                                        "file_type": {
                                            "type": "string",
                                            "description": "MIME type (e.g. `image/jpeg`, `video/mp4`). Optional — auto-detected from data URI prefix or defaults to `image/jpeg`."
                                        },
                                        "section": {
                                            "type": "string",
                                            "description": "Where the image will be used. Used for storage path organisation.",
                                            "enum": ["hero", "about", "featured", "header-logo", "header-favicon", "rooms", "gallery"]
                                        }
                                    }
                                },
                                "examples": {
                                    "image_with_data_uri": {
                                        "summary": "Image with data URI prefix",
                                        "value": {
                                            "file_data": "data:image/jpeg;base64,/9j/4AAQSkZJRg...",
                                            "file_name": "hero-background.jpg",
                                            "section": "hero"
                                        }
                                    },
                                    "image_raw_base64": {
                                        "summary": "Image with raw base64 (no prefix)",
                                        "value": {
                                            "file_data": "/9j/4AAQSkZJRg...",
                                            "file_name": "room-photo.jpg",
                                            "file_type": "image/jpeg",
                                            "section": "rooms"
                                        }
                                    },
                                    "logo_upload": {
                                        "summary": "Logo upload",
                                        "value": {
                                            "file_data": "data:image/png;base64,iVBORw0KGgo...",
                                            "file_name": "company-logo.png",
                                            "section": "header-logo"
                                        }
                                    }
                                }
                            }
                        }
                    },
                    "responses": {
                        "200": {
                            "description": "Upload successful",
                            "content": {
                                "application/json": {
                                    "example": {
                                        "success": true,
                                        "url": "https://pub-543ea0ea60674fffbc40f7ca17a21278.r2.dev/website/hero/123/large/uuid-hero-background.webp",
                                        "urls": {
                                            "original": "https://pub-543ea0ea60674fffbc40f7ca17a21278.r2.dev/website/hero/123/original/uuid-hero-background.webp",
                                            "large": "https://pub-543ea0ea60674fffbc40f7ca17a21278.r2.dev/website/hero/123/large/uuid-hero-background.webp",
                                            "medium": "https://pub-543ea0ea60674fffbc40f7ca17a21278.r2.dev/website/hero/123/medium/uuid-hero-background.webp",
                                            "thumbnail": "https://pub-543ea0ea60674fffbc40f7ca17a21278.r2.dev/website/hero/123/thumbnail/uuid-hero-background.webp"
                                        }
                                    }
                                }
                            }
                        },
                        "400": { "description": "Missing required fields (file_data or file_name)" },
                        "413": { "description": "File too large (over 10 MB for images, 50 MB for videos)" }

            // ===== PAGES =====
            "/api/partner/websites/{websiteId}/pages": {
                "get": {
                    "tags": ["Pages"],
                    "summary": "List Pages",
                    "description": "Returns all pages for a website, including publish status.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } }
                    ],
                    "responses": { "200": { "description": "List of pages", "content": { "application/json": { "example": { "success": true, "pages": [{ "id": 1, "page_slug": "home", "page_title": "Home", "menu_visible": "main_menu", "menu_order": 1, "enabled": true, "is_published": true }] } } } } }
                },
                "post": {
                    "tags": ["Pages"],
                    "summary": "Create Page",
                    "description": "Create a new page. page_slug and page_title are required.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } }
                    ],
                    "requestBody": {
                        "required": true,
                        "content": { "application/json": { "example": { "page_slug": "about", "page_title": "About Us", "menu_visible": "main_menu", "menu_order": 2, "sections": [], "enabled": true } } }
                    },
                    "responses": { "200": { "description": "Page created", "content": { "application/json": { "example": { "success": true, "page": { "id": 2, "page_slug": "about", "page_title": "About Us", "menu_visible": "main_menu", "menu_order": 2, "enabled": true } } } } } }
                }
            },
            "/api/partner/websites/{websiteId}/pages/{slug}": {
                "get": {
                    "tags": ["Pages"],
                    "summary": "Get Page",
                    "description": "Get a single page with all its sections.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" }, "description": "Page slug" }
                    ],
                    "responses": { "200": { "description": "Page with sections" } }
                },
                "put": {
                    "tags": ["Pages"],
                    "summary": "Update Page",
                    "description": "Update page settings. Only provided fields are changed.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "content": { "application/json": { "example": { "page_title": "Updated Title", "menu_visible": "main_menu", "menu_order": 3, "enabled": true } } }

                    "responses": { "200": { "description": "Page updated" } }

                    "tags": ["Pages"],
                    "summary": "Delete Page",
                    "description": "Permanently delete a page and all its sections.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } }

                    "responses": { "200": { "description": "Page deleted", "content": { "application/json": { "example": { "success": true, "deleted": { "id": 2, "page_slug": "about" } } } } } }

                "put": {

                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } }

                    "requestBody": {
                        "required": true,
                        "content": { "application/json": { "example": { "published": true } } }

                    "responses": { "200": { "description": "Publish status updated", "content": { "application/json": { "example": { "success": true, "page": { "id": 1, "slug": "about", "title": "About Us", "is_published": true, "updated_at": "2026-03-08T10:00:00Z" } } } } } }
                }
            },

            // ===== PAGE SECTIONS =====
            "/api/partner/section-types": {
                "get": {
                    "tags": ["Page Sections"],
                    "summary": "List Section Types",
                    "description": "Returns all available section types with their field definitions. Use these types when adding sections to a page.",
                    "responses": { "200": { "description": "List of section types", "content": { "application/json": { "example": { "success": true, "section_types": [{ "type": "hero", "label": "Hero Banner", "fields": ["heading", "subheading", "image", "cta_text", "cta_link"] }, { "type": "text", "label": "Text Block", "fields": ["heading", "body"] }] } } } } }
                }
            },
            "/api/partner/websites/{websiteId}/pages/{slug}/sections": {
                "put": {
                    "tags": ["Page Sections"],
                    "summary": "Replace All Sections",

                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "required": true,
                        "content": { "application/json": { "example": { "sections": [{ "id": "sec_1", "type": "hero", "heading": "Welcome", "image": "https://example.com/hero.jpg" }, { "id": "sec_2", "type": "text", "heading": "About", "body": "Our story..." }] } } }
                    },
                    "responses": { "200": { "description": "Sections replaced", "content": { "application/json": { "example": { "success": true, "sections": [], "updated_at": "2026-03-08T10:00:00Z" } } } } }
                },
                "post": {
                    "tags": ["Page Sections"],
                    "summary": "Add Section",
                    "description": "Append a new section to the page. An ID is auto-generated if not provided.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "required": true,
                        "content": { "application/json": { "example": { "type": "text", "heading": "New Section", "body": "Content here..." } } }
                    },
                    "responses": { "200": { "description": "Section added", "content": { "application/json": { "example": { "success": true, "section": { "id": "sec_abc123", "type": "text" }, "updated_at": "2026-03-08T10:00:00Z" } } } } }
                }
            },
            "/api/partner/websites/{websiteId}/pages/{slug}/sections/reorder": {
                "put": {
                    "tags": ["Page Sections"],
                    "summary": "Reorder Sections",
                    "description": "Reorder sections by providing an array of section IDs in the desired order.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "required": true,
                        "content": { "application/json": { "example": { "order": ["sec_2", "sec_1", "sec_3"] } } }
                    },
                    "responses": { "200": { "description": "Sections reordered" } }
                }
            },
            "/api/partner/websites/{websiteId}/pages/{slug}/sections/{sectionId}": {
                "put": {
                    "tags": ["Page Sections"],
                    "summary": "Update Section",
                    "description": "Update a specific section by ID. Only provided fields are merged into the existing section.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } },
                        { "name": "sectionId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                        "content": { "application/json": { "example": { "heading": "Updated Heading", "body": "New content..." } } }
                    },
                    "responses": { "200": { "description": "Section updated" } }
                },
                "delete": {
                    "tags": ["Page Sections"],
                    "summary": "Delete Section",
                    "description": "Remove a section from the page by its ID.",
                    "parameters": [
                        { "name": "websiteId", "in": "path", "required": true, "schema": { "type": "integer" } },
                        { "name": "slug", "in": "path", "required": true, "schema": { "type": "string" } },
                        { "name": "sectionId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "responses": { "200": { "description": "Section deleted" } }
                }
            },

            "/api/public/hostaway-reviews": {

            "/api/public/client/{clientId}/contact-form": {
                "post": {
                    "tags": ["Public"],
                    "summary": "Submit contact form message",
                    "description": "Sends a contact form submission via email to the site owner. Recipient priority: form-email setting > contact page email > account admin email. No authentication required.",
                    "parameters": [
                        { "name": "clientId", "in": "path", "required": true, "schema": { "type": "integer" }, "description": "Account ID (client_id)" }
                    ],
                    "requestBody": {
                        "required": true,
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "required": ["name", "email", "message"],
                                    "properties": {
                                        "name": { "type": "string", "example": "John Smith" },
                                        "email": { "type": "string", "format": "email", "example": "john@example.com" },
                                        "subject": { "type": "string", "example": "Booking enquiry" },
                                        "message": { "type": "string", "example": "I would like to enquire about availability for next weekend." },
                                        "page_url": { "type": "string", "example": "https://myhotel.sites.gas.travel/contact/" }
                                    }
                                }
                            }
                        }
                    },
                    "responses": {
                        "200": {
                            "description": "Message sent successfully",
                            "content": { "application/json": { "example": { "success": true } } }
                        },
                        "400": {
                            "description": "Validation error",
                            "content": { "application/json": { "example": { "success": false, "error": "Name, email and message are required" } } }
                        },
                        "404": {
                            "description": "Site not found",
                            "content": { "application/json": { "example": { "success": false, "error": "Site not found" } } }
                        }
                    },
                    "security": []
                }
            },

                                    }
                                }
                            }
                        }
                    },
                    "security": []
                }
            }

    // Initialize Swagger UI
    window.onload = function() {
        SwaggerUIBundle({
            spec: spec,
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            plugins: [
                SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "StandaloneLayout",
            defaultModelsExpandDepth: 2,
            defaultModelExpandDepth: 2,
            docExpansion: "list",
            filter: true,
            showExtensions: true,
            tryItOutEnabled: true,
            requestInterceptor: function(req) {
                // Auto-inject API key into /api/partner/_KEY_/ URLs
                const apiKey = req.headers['X-API-Key'];
                if (apiKey && req.url.includes('/api/partner/')) {
                    req.url = req.url.replace(/\/api\/partner\/[^/]*\//, '/api/partner/' + apiKey + '/');
                }
                return req;
            }
        });
    };
    </script>
