# Railway build configuration (nixpacks picks this up automatically).
#
# server.js shells out to `ssh` and `scp` for custom-domain auto-provisioning
# (nginx vhost + Let's Encrypt cert + WP multisite mapping on the VPS).
# Railway's default Node image doesn't include OpenSSH, so we install it here.
[phases.setup]
nixPkgs = ["openssh"]
